name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb for Debian trixie
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches debian/changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev
          CHANGELOG_VER=$(dpkg-parsechangelog -l debian/changelog -S Version | cut -d- -f1)
          echo "tag=$TAG changelog=$CHANGELOG_VER"
          if [ "$TAG" != "$CHANGELOG_VER" ]; then
            echo "ERROR: tag '$TAG' does not match debian/changelog version '$CHANGELOG_VER'" >&2
            exit 1
          fi

      - name: Fetch sibling .debs
        run: |
          mkdir -p deps
          for repo in bc-core bc-allocators bc-containers bc-io bc-concurrency bc-runtime; do
            gh release download --repo "Unmanaged-Bytes/${repo}" --pattern '*.deb' --dir deps
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build in debian:trixie container
        run: |
          docker run --rm -v "$PWD:/src" -w /src --entrypoint /bin/bash debian:trixie -c '
            set -eux
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
                debhelper meson ninja-build pkg-config \
                libcmocka-dev \
                build-essential devscripts ca-certificates

            apt-get install -y --no-install-recommends ./deps/*.deb

            dpkg-buildpackage -us -uc -b
            mkdir -p /src/dist
            mv ../bc-seek_*.deb ../bc-seek_*.buildinfo ../bc-seek_*.changes /src/dist/ 2>/dev/null || true
          '

      - name: Collect artefacts
        run: |
          ls -la dist/
          [ -n "$(ls dist/*.deb 2>/dev/null)" ]

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.buildinfo
            dist/*.changes
          generate_release_notes: true
          fail_on_unmatched_files: true
